# quarkus-llm-chat configuration
quarkus.http.port=8090

# Static resources served from META-INF/resources/
# NOTE: HTTP compression is disabled to prevent Vert.x buffering of SSE streams.
quarkus.http.enable-compression=false

# Disable browser caching for static files
quarkus.http.static-resources.caching-enabled=false

# SSE connections need long idle timeout (default 30s is too short)
quarkus.http.idle-timeout=PT0S

# Local LLM servers (OpenAI-compatible API). Comma-separated URLs.
llm-chat.servers=http://192.168.5.15:8000,http://192.168.5.13:8000

# Maximum conversation history per user (number of messages)
llm-chat.max-history=50

# Application title (displayed in browser header and tab)
llm-chat.title=Local LLM

# Single-user mode: skip login, use fixed userId "default"
llm-chat.single-user-mode=false

# Keybind mode: default, emacs, or vi
llm-console.keybind=default
